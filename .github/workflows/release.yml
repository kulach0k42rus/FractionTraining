name: Build and Release WinForms App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.2.0
    
    - name: Restore NuGet packages
      run: nuget restore FractionTraining.sln
    
    - name: Build project
      run: msbuild FractionTraining.sln /p:Configuration=Release /p:Platform="Any CPU"
    
    - name: Package EXE
      run: |
        # Путь к папке с собранным приложением (из логов сборки)
        $sourcePath = "FractionTraining\bin\Release"
        
        if (Test-Path $sourcePath) {
            Write-Host "Found files in: $sourcePath"
            Get-ChildItem $sourcePath
            
            # Создаем архив
            Compress-Archive -Path "$sourcePath\*" -DestinationPath "FractionTraining.zip" -Force
            Write-Host "Archive created successfully!"
        } else {
            Write-Host "ERROR: Path not found: $sourcePath"
            exit 1
        }
      shell: powershell
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: FractionTraining.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}